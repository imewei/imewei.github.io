{% if page.hero_image %}
<section class="hero" style="background-image:url('{{ page.hero_image | relative_url }}');">
  <div class="hero__content">
    {% if page.hero_kicker %}<p class="eyebrow">{{ page.hero_kicker }}</p>{% endif %}
    <h1>{{ page.hero_title | default: page.title }}</h1>
    {% if page.hero_subtitle %}<p>{{ page.hero_subtitle }}</p>{% endif %}
  </div>
</section>
{% endif %}
